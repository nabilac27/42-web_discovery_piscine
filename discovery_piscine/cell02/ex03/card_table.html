<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="card_table.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <!-- Title -->
    <div class="title">USER PROFILE CARD</div>

    <table class="card">
        <!-- Profile Picture -->
        <tr>
            <td class="profile-container">
                <img src="img/pict2.png" alt="Picture" class="profile-pic">
            </td>
        </tr>

        <!-- Username -->
        <tr>
            <td class="username">nchairun</td>
        </tr>

        <!-- Description -->
        <tr>
            <td class="description">
                <p>Level 4, Core Curriculum</p>
                <p>42 Heilbronn</p>
            </td>
        </tr>

        <!-- Social Media -->
        <tr>
            <td class="socials">
                <a href="https://github.com/nabilac27"><i class="fa fa-github"></i></a>
                <a href="https://www.linkedin.com/in/nabila-c-9b2a0a1b5/"><i class="fa fa-linkedin"></i></a>
                <a href="https://www.42heilbronn.de/en/"><i class="fa fa-twitter"></i></a>
                <a href="https://www.42heilbronn.de/en/"><i class="fa fa-facebook"></i></a>
            </td>
        </tr>

        <!-- Contact Button -->
        <tr>
            <td class="contact-btn-container">
                <a href="mailto:nabilac@outlook.de" class="contact-btn">Contact</a>
            </td>
        </tr>
    </table>
</body>

</html>

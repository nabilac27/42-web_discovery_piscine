<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #6c4fe0; /* purple background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .dropdown {
      position: relative;
      width: 250px;
    }

    .dropdown-btn {
      background: white;
      border: none;
      border-radius: 10px;
      padding: 12px 15px;
      width: 100%;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 110%;
      left: 0;
      background: white;
      border-radius: 10px;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      padding: 10px 0;
      z-index: 100;
    }

    .dropdown-content a {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      font-size: 15px;
      transition: background 0.2s ease;
      cursor: pointer;
    }

    .dropdown-content a:hover {
      background: #f2f2f2;
    }

    /* CSS only dropdown */
    .dropdown:focus-within .dropdown-content {
      display: block;
    }

    .arrow {
      transition: transform 0.2s ease;
    }

    .dropdown:focus-within .arrow {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>

  <div class="dropdown" tabindex="0">
    <button class="dropdown-btn">
      Dropdown Menu
      <span class="arrow">▲</span>
    </button>
    <div class="dropdown-content">
      <a>HTML</a>
      <a>CSS</a>
      <a>JavaScript</a>
      <a>Figma</a>
      <a>Python</a>
    </div>
  </div>

</body>
</html>

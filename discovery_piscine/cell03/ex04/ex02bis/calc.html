<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>It's over 9000</title>
    <style>
      body {
        font-family: courier;
        background: #f0f2f5;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .title {
        font-size: 50px;
        color: #333;
        margin-bottom: 30px;
        font-weight: bold;
        text-shadow: 2px 2px #cfc8c8;
        text-align: center;
      }

      table {
        width: 350px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        text-align: center;
        font-size: 20px;
        color: #555;
        font-weight: bold;
      }

      .number {
        padding: 40px;
      }

      .input-number {
        width: 250px;
        height: 25px;
        text-align: center;
      }

      .select-operator {
        width: 260px;
        height: 25px;
        text-align: center;
      }

      .tryme {
        padding: 40px;
      }

      button {
        background-color: #007bff;
        color: #fff;
        font-size: 15px;
        border: none;
        border-radius: 20px;
        width: 250px;
        height: 40px;
        margin-bottom: 10px;
        cursor: pointer;
      }

      button:hover {
        background-color: #065ebd;
        transform: translateY(-1px);
      }
    </style>
    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  </head>

  <body>
    <div>
      <div class="title">CALCULATOR</div>

      <table>
        <tr>
          <td class="number">
            <input
              class="input-number"
              id="left-num"
              type="number"
              placeholder="Left Number"
            />
          </td>
        </tr>
        <tr>
          <td>
            <select class="select-operator" id="operator">
              <option value="+">+</option>
              <option value="-">-</option>
              <option value="*">*</option>
              <option value="/">/</option>
              <option value="%">%</option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="number">
            <input
              class="input-number"
              id="right-num"
              type="number"
              placeholder="Right Number"
            />
          </td>
        </tr>
        <tr>
          <td class="tryme">
            <button type="button" id="button">Try me!</button>
          </td>
        </tr>
      </table>
    </div>

    <script>
      $(document).ready(function () {
        function calculation() {
          let left_num = Number($("#left-num").val());
          let right_num = Number($("#right-num").val());
          let operator = $("#operator").val();

          // Check Positive Integer
          if (
            !Number.isInteger(left_num) ||
            !Number.isInteger(right_num) ||
            left_num < 0 ||
            right_num < 0
          ) {
            alert("Error :(");
            return;
          }

          // Division/modulo by zero
          if ((operator === "/" || operator === "%") && right_num === 0) {
            alert("It's over 9000!");
            console.log("It's over 9000!");
            return;
          }

          // Calculation
          let result;
          switch (operator) {
            case "+":
              result = left_num + right_num;
              break;
            case "-":
              result = left_num - right_num;
              break;
            case "*":
              result = left_num * right_num;
              break;
            case "/":
              result = left_num / right_num;
              break;
            case "%":
              result = left_num % right_num;
              break;
            default:
              alert("Error :(");
              return;
          }

          console.log(`Result: ${result}`);
        }

        $("#button").click(calculation);

        setInterval(() => {
          alert("Please, use me...");
        }, 30000);
      });
    </script>
  </body>
</html>

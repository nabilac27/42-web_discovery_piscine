<!DOCTYPE html>
<html lang="en">

<head>
  <title>Change Background</title>
  <link rel="stylesheet" href="backgroound.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    function random_color() {
      var red = Math.floor(Math.random() * 256);
      var green = Math.floor(Math.random() * 256);
      var blue = Math.floor(Math.random() * 256);

      $("body").css("background-color", `rgb(${red}, ${green}, ${blue})`); // jQuery
    }
  </script>
</head>

<body>
  <button onclick="random_color()">Click Me!</button>
</body>

</html>


<!-- 
  JS      = document.something.style.property

  jQuery  = $(selector).css("property", value).
-->

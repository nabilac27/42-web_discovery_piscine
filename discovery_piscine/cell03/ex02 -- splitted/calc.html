<!DOCTYPE html>
<html lang="en">

<head>
    <title>It's over 9000</title>
    <link rel="stylesheet" href="calc.css">
    <script src="calc.js"></script>
</head>

<body>
    <!-- Title -->
    <div class="title">IT'S OVER 9000 CALCULATOR</div>

    <table>
        <!-- Text Input: Left Number -->
        <tr>
            <td class="number">
                <input class="input-number" type="number" placeholder="Left Number">
            </td>
        </tr>

        <!-- Select Field: Operator -->
        <tr>
            <td>
                <select class="select-operator">
                    <div class="select-operator-dropdown"> 
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="/">/</option>
                        <option value="%">%</option>
                    </div>
                </select>
            </td>
        </tr>

        <!-- Text Input: Right Number -->
        <tr>
            <td class="number">
                <input class="input-number" type="number" placeholder="Right Number">
            </td>
        </tr>


        <!-- Submit Button: Try Me -->
        <tr>
            <td class="tryme">
                <button type="submit">Try me!</button>
            </td>
        </tr>
    </table>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Balloon</title>
  <style>
    #balloon {
      width: 200px;
      height: 200px;
      background: red;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
      /* smooth changes */
    }
  </style>
  <script>
    let size = 200;
    let colors = ["red", "green", "blue"];
    let colorIndex = 0;

    function updateBalloon() {
      size += 10;
      if (size > 420) size = 200;         // reset if too big
      colorIndex = (colorIndex + 1) % 3;  // change color
      let balloon = document.getElementById("balloon");
      balloon.style.width = size + "px";
      balloon.style.height = size + "px";
      balloon.style.backgroundColor = colors[colorIndex];
    }
  </script>
</head>

<body>
  <div id="balloon" onclick="updateBalloon()"></div>
</body>

</html>

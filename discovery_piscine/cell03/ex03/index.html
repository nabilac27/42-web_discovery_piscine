<!DOCTYPE html>
<html lang="en">
  <head>
    <title>TO DO or Not TO DO</title>
    <style>
      body {
        font-family: monospace;
        background: linear-gradient(180deg, #000000d1 0%, #121212 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #card {
        /* width: 350px; */
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        padding: 30px;
        text-align: center;
      }

      #card:hover {
        transform: translateY(-4px);
      }

      #title {
        font-size: 30px;
        color: black;
        margin: 10px;
        font-weight: bold;
        text-shadow: 2px 2px #cfc8c8;
      }

      #button-new {
        font-size: 15px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 15px;
        width: 250px;
        height: 50px;
        margin-top: 15px;
        cursor: pointer;
      }
      #button-new:hover {
        background-color: #065ebd;
        transform: translateX(3px);
      }

      #ft_list {
        display: flex;
        flex-direction: column;
        margin-top: 5px;
        gap: 5px;
      }

      .todo-item {
        background: #f0f2f5;
        color: #333;
        padding: 15px;
        border-radius: 15px;
        text-align: left;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.2s, transform 0.1s;
      }

      .todo-item:hover {
        background: #e2e6ea;
        transform: translateX(3px);
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="title">TO DO LIST</div>
      <hr />
      <button id="button-new">New</button>
      <div id="ft_list"></div>
    </div>
    <script src="todo.js"></script>
  </body>
</html>

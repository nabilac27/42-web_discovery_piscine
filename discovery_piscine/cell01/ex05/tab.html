<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tab</title>
</head>
<body style="display:flex; justify-content:center;">
    <table style="border: solid black; height: 100px; width: 800px; table-layout: fixed;">
        <tr>
            <td style="background-color: rgb(103, 185, 218); width: 400px; text-align: center; font-family: monospace;">
                <h1>HELLO</h1>
            </td>
            <td  style="background-color: rgb(222, 134, 216); width: 400px; text-align: center; font-family: monospace;">
                <h1>WORLD</h1>
            </td>
        </tr>
    </table>
</body>
</html>



<!-- 
    HTML Table | https://www.w3schools.com/html/html_tables.asp


    CSS table-layout Property | https://www.w3schools.com/cssref/pr_tab_table-layout.php
        defines the algorithm used to lay out table cells, rows, and columns.
        Syntax    table-layout: auto|fixed|initial|inherit;

        fixed	Sets a fixed table layout algorithm. 
                The table and column widths are set 
                by the widths of table and col or by the width of the first row of cells.

    CSS Display Property | https://www.w3schools.com/cssref/pr_class_display.php
        specifies the display behavior (the type of rendering box) of an element.
        Syntax    display: value;

   CSS justify-content Property | https://www.w3schools.com/cssref/css3_pr_justify-content.php
        aligns the flexible container's items when the items 
        do not use all available space on the main-axis (horizontally).

        Syntax     justify-content: value; | https://www.w3schools.com/cssref/playdemo.php?filename=playcss_justify-content&preval=flex-start
-->

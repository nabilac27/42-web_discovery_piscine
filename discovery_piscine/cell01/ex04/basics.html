<!DOCTYPE html>
<html lang="en">

<head>
    <title>Basics</title>
</head>

<body style="background-color: #FF77AA; text-align: center;">
    
    <!-- Page Title -->
    <h1 style="color: white; font-family: monospace;">% Walmart vs Target %</h1>

    <!-- Walmart Div -->
    <div style="display: inline-block; text-align: center; margin: 10px;">
        <img src="./walmart.png" height="200" style="display: block; margin-bottom: 10px;">
        <a href="https://walmart.com" style="color: white;">Walmart</a>
    </div>
    
    <!-- Target Div -->
    <div style="display: inline-block; text-align: center; margin: 10px;">
        <img src="./target.png" height="200" style="display: block; margin-bottom: 10px;">
        <a href="https://target.com" style="color: white;">Target</a>
    </div>

    <!-- Horizontal Line -->
    <hr>

    <!-- Footer -->
    <div style="text-align: right; color: white; font-family: monospace; font-style: italic; ">
        &copy; nchairun, 2025
    </div>

</body>


</html>

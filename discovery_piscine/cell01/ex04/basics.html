<!DOCTYPE html>

<html lang="en">
  <head>
    <title>Basics</title>
    <style>
        body {
            background-color: #ff77aa;
            text-align: center;
            font-family: monospace;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        div {
            display: inline-block;
            text-align: center;
            margin: 10px;
        }
        img {
            display: block;
            margin-bottom: 10px;
            border-radius: 6px;
            box-shadow: 0 10px 16px rgba(0,0,0,0.3), 0 0 0 2px #ff77aa;
        }
        p {
            text-align: right;
            font-style: italic;
        }
    </style>
  </head>

  <body>
    <h1>% Walmart vs Target %</h1>

    <div>
      <img src="./walmart.png" height="200" />
      <a href="https://walmart.com">Walmart</a>
    </div>

    <div>
      <img src="./target.png" height="200" />
      <a href="https://target.com">Target</a>
    </div>

    <hr>

    <p>&copy; nchairun, 2025</p>
  </body>
</html>

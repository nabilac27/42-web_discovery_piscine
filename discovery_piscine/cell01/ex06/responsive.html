<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tab</title>
    <style>
        body {
            display:flex; 
            justify-content:center;
            font-family: monospace;
            color: whitesmoke;
            text-shadow: 2px 2px 4px rgba(0,0,0,5);
        }
        table {
            border: solid black;
            border-collapse: collapse;
            height: 100px; 
            width: 800px; 
        }
        td {
            border: solid black;
            width: 400px; 
            text-align: center; 
        }
        .cell_left
    {
        background-color:  #3C3C3C;
    }
    .cell_right
    {
        background-color: #DAB732;
    }
    </style>
</head>
<body>
    <table>
        <tr>
            <td class="cell_left"><h1>HELLO</h1></td>
            <td class="cell_right"><h1>WORLD</h1></td>
        </tr>
    </table>
</body>
</html>


<!-- 
    CSS Display Property | https://www.w3schools.com/cssref/pr_class_display.php
        specifies the display behavior (the type of rendering box) of an element.
        Syntax    display: value;

    CSS justify-content Property | https://www.w3schools.com/cssref/css3_pr_justify-content.php
        aligns the flexible container's items when the items 
        do not use all available space on the main-axis (horizontally).

        Syntax     justify-content: value; | https://www.w3schools.com/cssref/playdemo.php?filename=playcss_justify-content&preval=flex-start
